## Jotnar server only — no bundled inference engine.
## Use this when you're running your own inference backend (Ollama, vLLM, SGLang, etc.)
## separately, outside of Docker Compose.
##
## Usage:
##   docker compose -f docker-compose.server-only.yml up
##
## Set INFERENCE_HOST to match your setup. The backend type (Ollama vs OpenAI-compatible)
## is auto-detected.
## For Ollama on the host machine:
##   INFERENCE_HOST=http://host.docker.internal:11434 docker compose -f docker-compose.server-only.yml up

services:
  jotnar:
    image: ghcr.io/UmushiUmushi/jotnar-server:latest
    ports:
      - "8910:8910"
    volumes:
      - jotnar-data:/data
    environment:
      - INFERENCE_HOST=${INFERENCE_HOST:-http://host.docker.internal:11434}
      - INFERENCE_TIMEOUT_SEC=${INFERENCE_TIMEOUT_SEC:-300}
      - INFERENCE_MAX_RETRIES=${INFERENCE_MAX_RETRIES:-3}
      - INFERENCE_WORKERS=${INFERENCE_WORKERS:-1}
      - JOTNAR_DB_PATH=${JOTNAR_DB_PATH:-/data/journal.db}
      - JOTNAR_CONFIG_PATH=${JOTNAR_CONFIG_PATH:-/data/config.yml}
    restart: unless-stopped

volumes:
  jotnar-data:
